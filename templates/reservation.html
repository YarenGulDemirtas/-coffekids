<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Rezervasyon - Coffee Kids</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>

        /* ========================= */
        /* RESERVATION PAGE */
        /* ========================= */

        .reservation-section{

            width:100%;

            display:flex;

            justify-content:center;

            padding:50px 20px 90px;
        }

        .reservation-card{

            width:100%;

            max-width:650px;

            background:rgba(255,255,255,0.92);

            backdrop-filter:blur(10px);

            border-radius:34px;

            padding:38px;

            box-shadow:
            0 10px 40px rgba(0,0,0,0.08),
            inset 0 1px 0 rgba(255,255,255,0.7);

            border:1px solid rgba(255,255,255,0.4);
        }

        .reservation-header{

            text-align:center;

            margin-bottom:30px;
        }

        .reservation-badge{

            width:78px;
            height:78px;

            margin:0 auto 18px;

            border-radius:24px;

            background:linear-gradient(
                135deg,
                #E64A66,
                #ff8da3
            );

            display:flex;
            align-items:center;
            justify-content:center;

            color:white;

            font-size:30px;

            box-shadow:
            0 10px 25px rgba(230,74,102,0.25);
        }

        .reservation-title{

            font-size:34px;

            color:var(--primary-color);

            margin-bottom:10px;
        }

        .reservation-subtitle{

            font-size:15px;

            color:#777;

            line-height:1.6;
        }

        .reservation-form{
            margin-top:30px;
        }

        .form-grid{

            display:grid;

            grid-template-columns:1fr 1fr;

            gap:18px;
        }

        .form-group{
            margin-bottom:18px;
        }

        .form-group label{

            display:block;

            margin-bottom:10px;

            font-size:14px;

            font-weight:600;

            color:var(--text-dark);
        }

        .input-box{

            position:relative;
        }

        .input-box i{

            position:absolute;

            left:18px;
            top:50%;

            transform:translateY(-50%);

            color:var(--primary-color);

            font-size:15px;
        }

        .form-control{

            width:100%;

            height:58px;

            border:none;

            outline:none;

            border-radius:18px;

            background:#f6f6f6;

            padding:0 18px 0 50px;

            font-size:15px;

            transition:0.3s ease;
        }

        .form-control:focus{

            background:white;

            box-shadow:
            0 0 0 4px rgba(230,74,102,0.12);
        }

        .reservation-btn{

            width:100%;

            height:62px;

            border:none;

            border-radius:22px;

            margin-top:12px;

            font-size:16px;

            font-weight:600;

            cursor:pointer;

            display:flex;
            align-items:center;
            justify-content:center;

            gap:10px;

            background:linear-gradient(
                135deg,
                #E64A66,
                #ff7f99
            );

            color:white;

            box-shadow:
            0 10px 25px rgba(230,74,102,0.22);

            transition:0.3s ease;
        }

        .reservation-btn:hover{
            transform:translateY(-2px);
        }

        /* ========================= */
        /* MOBILE */
        /* ========================= */

        @media (max-width:768px){

            .reservation-section{
                padding:20px 16px 70px;
            }

            .reservation-card{

                padding:24px 18px;

                border-radius:28px;
            }

            .reservation-badge{

                width:68px;
                height:68px;

                font-size:26px;

                border-radius:22px;
            }

            .reservation-title{
                font-size:28px;
            }

            .reservation-subtitle{
                font-size:14px;
            }

            .form-grid{

                grid-template-columns:1fr;
            }

            .form-control{

                height:56px;

                font-size:14px;
            }

            .reservation-btn{

                height:58px;

                border-radius:20px;

                font-size:15px;
            }

        }

    </style>

</head>

<body>

    <header class="navbar">

        <div class="logo">
            <a href="/">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="Coffee Kids Logo">
            </a>
        </div>

        <nav class="nav-links">

            <a href="/">
                <i class="fa-solid fa-house"></i>
                Ana Sayfa
            </a>

            <a href="/menu">
                <i class="fa-solid fa-utensils"></i>
                Menü
            </a>

            <a href="/rezervasyon" class="active">
                <i class="fa-regular fa-calendar"></i>
                Rezervasyon
            </a>

            <a href="/login">
                <i class="fa-solid fa-lock"></i>
                Yönetici
            </a>

        </nav>

        <div class="nav-actions">

            <button class="menu-btn">
                <i class="fa-solid fa-bars"></i>
            </button>

        </div>

    </header>

    <section class="reservation-section">

        <div class="reservation-card">

            <div class="reservation-header">

                <div class="reservation-badge">
                    <i class="fa-regular fa-calendar-check"></i>
                </div>

                <h1 class="reservation-title">
                    Yerinizi Ayırtın
                </h1>

                <p class="reservation-subtitle">
                    Çocuklarınızla birlikte keyifli ve güvenli vakit geçirmek için rezervasyon oluşturabilirsiniz.
                </p>

            </div>

            <form action="/rezervasyon" method="POST" class="reservation-form">

                <div class="form-group">

                    <label>Ad Soyad</label>

                    <div class="input-box">

                        <i class="fa-regular fa-user"></i>

                        <input
                            type="text"
                            name="ad_soyad"
                            class="form-control"
                            placeholder="Örn: Aslı Yılmaz"
                            required
                        >

                    </div>

                </div>

                <div class="form-group">

                    <label>Telefon Numarası</label>

                    <div class="input-box">

                        <i class="fa-solid fa-phone"></i>

                        <input
                            type="tel"
                            name="telefon"
                            class="form-control"
                            placeholder="0555 123 45 67"
                            required
                        >

                    </div>

                </div>

                <div class="form-group">

                    <label>Rezervasyon Tarihi</label>

                    <div class="input-box">

                        <i class="fa-regular fa-calendar"></i>

                        <input
                            type="date"
                            name="tarih"
                            class="form-control"
                            required
                        >

                    </div>

                </div>

                <div class="form-grid">

                    <div class="form-group">

                        <label>Başlangıç Saati</label>

                        <div class="input-box">

                            <i class="fa-regular fa-clock"></i>

                            <input
                                type="time"
                                name="baslangic"
                                class="form-control"
                                required
                            >

                        </div>

                    </div>

                    <div class="form-group">

                        <label>Bitiş Saati</label>

                        <div class="input-box">

                            <i class="fa-regular fa-clock"></i>

                            <input
                                type="time"
                                name="bitis"
                                class="form-control"
                                required
                            >

                        </div>

                    </div>

                </div>

                <div class="form-grid">

                    <div class="form-group">

                        <label>Yetişkin Sayısı</label>

                        <div class="input-box">

                            <i class="fa-solid fa-user-group"></i>

                            <input
                                type="number"
                                name="yetiskin"
                                class="form-control"
                                min="1"
                                value="1"
                                required
                            >

                        </div>

                    </div>

                    <div class="form-group">

                        <label>Çocuk Sayısı</label>

                        <div class="input-box">

                            <i class="fa-solid fa-child-reaching"></i>

                            <input
                                type="number"
                                name="cocuk"
                                class="form-control"
                                min="0"
                                placeholder="İsteğe bağlı"
                            >

                        </div>

                    </div>

                </div>

                <button type="submit" class="reservation-btn">

                    Talebi Gönder

                    <i class="fa-solid fa-arrow-right"></i>

                </button>

            </form>

        </div>

    </section>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
