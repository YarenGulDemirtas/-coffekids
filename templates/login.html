<!DOCTYPE html>
<html lang="tr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Yönetici Girişi - Coffee Kids</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>

        body{
            background:#f6f7fb;
        }

        /* LOGIN ALANI */

        .login-section{

            width:100%;

            min-height:calc(100vh - 120px);

            display:flex;

            align-items:center;
            justify-content:center;

            padding:40px 20px 80px;
        }

        /* LOGIN CARD */

        .login-card{

            width:100%;

            max-width:500px;

            background:rgba(255,255,255,0.95);

            backdrop-filter:blur(12px);

            border-radius:32px;

            padding:38px 34px;

            box-shadow:
            0 10px 35px rgba(0,0,0,0.08);

            border:1px solid rgba(255,255,255,0.4);
        }

        /* HEADER */

        .login-header{

            text-align:center;

            margin-bottom:34px;
        }

        .login-badge{

            width:82px;
            height:82px;

            margin:0 auto 18px;

            border-radius:24px;

            background:linear-gradient(
                135deg,
                #E64A66,
                #ff8da3
            );

            display:flex;
            align-items:center;
            justify-content:center;

            color:white;

            font-size:30px;

            box-shadow:
            0 10px 24px rgba(230,74,102,0.22);
        }

        .login-title{

            font-size:34px;

            color:var(--primary-color);

            margin-bottom:8px;
        }

        .login-subtitle{

            font-size:15px;

            color:#777;

            line-height:1.6;
        }

        /* FORM */

        .login-form{

            display:flex;
            flex-direction:column;

            gap:18px;
        }

        .form-group label{

            display:block;

            margin-bottom:10px;

            font-size:14px;

            font-weight:600;

            color:var(--text-dark);
        }

        .input-box{
            position:relative;
        }

        .input-box i{

            position:absolute;

            left:18px;
            top:50%;

            transform:translateY(-50%);

            color:var(--primary-color);

            font-size:15px;
        }

        .form-control{

            width:100%;

            height:60px;

            border:none;

            outline:none;

            border-radius:18px;

            background:#f5f5f5;

            padding:0 18px 0 52px;

            font-size:15px;

            transition:0.3s ease;
        }

        .form-control:focus{

            background:white;

            box-shadow:
            0 0 0 4px rgba(230,74,102,0.12);
        }

        /* BUTTON */

        .login-btn{

            width:100%;

            height:60px;

            border:none;

            border-radius:20px;

            margin-top:8px;

            background:linear-gradient(
                135deg,
                #E64A66,
                #ff7f99
            );

            color:white;

            font-size:16px;

            font-weight:600;

            cursor:pointer;

            display:flex;
            align-items:center;
            justify-content:center;

            gap:10px;

            transition:0.3s ease;

            box-shadow:
            0 10px 24px rgba(230,74,102,0.22);
        }

        .login-btn:hover{
            transform:translateY(-2px);
        }

        /* HATA */

        .error-text{

            text-align:center;

            color:#e53935;

            font-size:14px;

            font-weight:600;

            margin-bottom:4px;
        }

        /* MOBİL */

        @media (max-width:768px){

            .login-section{

                padding:20px 16px 70px;
            }

            .login-card{

                padding:26px 20px;

                border-radius:28px;
            }

            .login-badge{

                width:70px;
                height:70px;

                font-size:26px;

                border-radius:20px;
            }

            .login-title{
                font-size:28px;
            }

            .login-subtitle{
                font-size:14px;
            }

            .form-control{

                height:56px;

                font-size:14px;
            }

            .login-btn{

                height:56px;

                font-size:15px;

                border-radius:18px;
            }

        }

    </style>

</head>

<body>

    <!-- NAVBAR -->

    <header class="navbar">

        <div class="logo">

            <a href="/">

                <img
                    src="{{ url_for('static', filename='logo.png') }}"
                    alt="Coffee Kids Logo"
                >

            </a>

        </div>

        <!-- MENÜ -->

        <nav class="nav-links">

            <a href="/">

                <i class="fa-solid fa-house"></i>

                Ana Sayfa

            </a>

            <a href="/menu">

                <i class="fa-solid fa-utensils"></i>

                Menü

            </a>

            <a href="/rezervasyon">

                <i class="fa-regular fa-calendar"></i>

                Rezervasyon

            </a>

            <a href="/login" class="active">

                <i class="fa-solid fa-lock"></i>

                Yönetici

            </a>

        </nav>

        <!-- HAMBURGER -->

        <div class="nav-actions">

            <button class="menu-btn">

                <i class="fa-solid fa-bars"></i>

            </button>

        </div>

    </header>

    <!-- LOGIN -->

    <section class="login-section">

        <div class="login-card">

            <div class="login-header">

                <div class="login-badge">

                    <i class="fa-solid fa-lock"></i>

                </div>

                <h1 class="login-title">

                    Yönetici Girişi

                </h1>

                <p class="login-subtitle">

                    Yönetim paneline erişmek için giriş yapın.

                </p>

            </div>

            {% if hata %}

            <p class="error-text">

                {{ hata }}

            </p>

            {% endif %}

            <!-- FORM -->

            <form action="/login" method="POST" class="login-form">

                <div class="form-group">

                    <label>
                        E-posta Adresi
                    </label>

                    <div class="input-box">

                        <i class="fa-regular fa-envelope"></i>

                        <input
                            type="email"
                            name="username"
                            class="form-control"
                            placeholder="admin@coffeekids.com"
                            required
                        >

                    </div>

                </div>

                <div class="form-group">

                    <label>
                        Şifre
                    </label>

                    <div class="input-box">

                        <i class="fa-solid fa-lock"></i>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            placeholder="••••••••"
                            required
                        >

                    </div>

                </div>

                <button type="submit" class="login-btn">

                    Giriş Yap

                    <i class="fa-solid fa-arrow-right"></i>

                </button>

            </form>

        </div>

    </section>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
