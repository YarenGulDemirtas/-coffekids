<!DOCTYPE html>
<html lang="tr">
    <style>

.login-section{
    width:100%;
    display:flex;
    justify-content:center;
    padding:60px 20px;
}

.login-card{
    width:100%;
    max-width:520px;
    background:white;
    border-radius:30px;
    padding:40px;
    box-shadow:0 10px 40px rgba(0,0,0,0.08);
}

.login-title{
    text-align:center;
    color:#E64A66;
    font-size:34px;
    margin-bottom:30px;
}

.login-form{
    display:flex;
    flex-direction:column;
    gap:18px;
}

.form-group label{
    display:block;
    margin-bottom:10px;
    font-weight:600;
}

.form-control{
    width:100%;
    height:58px;
    border:none;
    background:#f5f5f5;
    border-radius:18px;
    padding:0 18px;
    font-size:15px;
}

.login-btn{
    width:100%;
    height:58px;
    border:none;
    border-radius:18px;
    background:#E64A66;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
}

/* MOBİL */

@media (max-width:768px){

    .login-section{
        padding:20px 16px 70px;
    }

    .login-card{
        padding:24px 18px;
        border-radius:26px;
    }

    .login-title{
        font-size:28px;
    }

}

</style>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetici Girişi - Coffee Kids</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="login-page">

    <header class="navbar">

        <div class="logo">
            <a href="/">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="Coffee Kids Logo">
            </a>
        </div>

        <nav class="nav-links">

            <a href="/">
                <i class="fa-solid fa-house"></i>
                Ana Sayfa
            </a>

            <a href="/menu">
                <i class="fa-solid fa-utensils"></i>
                Menü
            </a>

            <a href="/login" class="active">
                <i class="fa-solid fa-lock"></i>
                Yönetici
            </a>

        </nav>

        <div class="nav-actions">

            <button class="menu-btn">
                <i class="fa-solid fa-bars"></i>
            </button>

        </div>

    </header>

    <section class="login-wrapper">

        <div class="form-container">

            <h2 class="login-title">
                <i class="fa-solid fa-lock"></i>
                Yönetici Girişi
            </h2>

            {% if hata %}
            <p class="error-text">{{ hata }}</p>
            {% endif %}

            <form action="/login" method="POST">

                <div class="form-group">
                    <label>E-posta Adresi</label>

                    <input
                        type="email"
                        name="username"
                        class="form-control"
                        placeholder="admin@cafe.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label>Şifre</label>

                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        placeholder="••••••••"
                        required
                    >
                </div>

                <button type="submit" class="btn btn-primary login-btn">
                    Giriş Yap
                </button>

            </form>

        </div>

    </section>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
